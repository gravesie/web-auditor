<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Web Auditor{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    :root { --fg: #1d2433; --muted: #6b7280; --line: #e5e7eb; --bg: #f9fafb; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           color: var(--fg); background: var(--bg); }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--line); background: #fff; }
    header h1 { margin: 0; font-size: 1.1rem; }
    main { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
    .muted { color: var(--muted); }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 1.25rem; }
  </style>
</head>
<body>
  <header><h1>Web Auditor</h1></header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
